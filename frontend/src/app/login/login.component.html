<div class="auth-panel">
  <h1>Logowanie</h1>
  <div class="ok-message" *ngIf="okMessage">{{ okMessage }}</div>
  <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>
  <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
    <div class="form-group">
      <label for="email">Email</label>
      <input
        id="email"
        type="email"
        name="email"
        [(ngModel)]="email"
        email
        placeholder="twoj@email.pl"
      />
      <div class="error-message" *ngIf="emailError">{{ emailError }}</div>
    </div>
    <div class="form-group">
      <label for="password">Hasło</label>
      <input
        id="password"
        type="password"
        name="password"
        [(ngModel)]="password"
        placeholder="••••••••"
      />
      <div class="error-message" *ngIf="passwordError">{{ passwordError }}</div>
    </div>
    <button type="submit" class="btn btn-primary" [disabled]="!loginForm.valid">
      Zaloguj się
    </button>
  </form>
  <p class="auth-switch">
    Nie masz konta?
    <a routerLink="/register">Zarejestruj się</a>
  </p>
</div>
